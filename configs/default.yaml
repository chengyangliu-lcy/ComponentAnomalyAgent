paths:
  dataset: 2025_dataset.jsonl
  image_root: 2025
  local_corpus_root: knowledge_base
  circuit_md_root: /media/work/1ECC291B3E106A4A/xinyang/circuit/warc_output/021150c8-bb23-4a74-9298-0e4be68a6eef
  local_kb_index: knowledge_base/circuit_md_fts
  outputs_dir: outputs
  logs_dir: logs

model:
  provider: dashscope    # "dashscope" or "vllm" — controls extra_body format for thinking mode
  api_key_env: DASHSCOPE_API_KEY
  base_url_env: DASHSCOPE_BASE_URL
  default_base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  agent_model_env: AGENT_MODEL
  vision_model_env: VISION_MODEL
  judge_model_env: JUDGE_MODEL
  default_agent_model: qwen3.6-plus
  default_vision_model: qwen3.6-plus
  default_judge_model: qwen-plus
  temperature: 0.7
  max_tokens: 2000
  planner_extra_body:
    enable_thinking: false
  vision_extra_body:
    enable_thinking: false
  answer_extra_body:
    enable_thinking: false

agent:
  strategy: agentic_tool_loop
  legacy_strategy: legacy_single_agent_web_reasoning
  max_reflection_rounds: 1
  max_iterations: 20
  max_total_seconds: 300
  planner_timeout_seconds: 25
  tool_timeout_seconds: 20
  vision_timeout_seconds: 35
  final_answer_timeout_seconds: 60
  web_read_timeout_seconds: 15
  enable_openhands_browser_primary: true
  openhands_browser_timeout_seconds: 15
  openhands_browser_max_chars: 6000
  openhands_browser_require_installed: true
  enable_jina_reader: true
  jina_max_chars: 8000
  jina_use_readerlm_fallback: true
  jina_min_quality_score: 0.55
  jina_min_clean_chars: 500
  enable_crawl4ai: true
  crawl4ai_timeout_seconds: 15
  crawl4ai_max_chars: 8000
  crawl4ai_word_count_threshold: 10
  crawl4ai_use_content_filter: true
  crawl4ai_content_filter_type: bm25     # "pruning" or "bm25"; bm25 uses title/snippet context
  crawl4ai_primary: false                # false = Jina first, crawl4ai as enhanced fallback
  crawl4ai_markdown_mode: best           # "best", "fit", or "raw"
  crawl4ai_content_source: markdown      # "best", "markdown", or "cleaned_html"
  crawl4ai_enable_stealth: true
  crawl4ai_scan_full_page: true
  crawl4ai_delay_before_return_html: 0.5
  crawl4ai_css_selector: ""              # optional hard restriction, e.g. "article"
  crawl4ai_target_elements: []           # optional focused selectors; keep empty for generic extraction
  crawl4ai_excluded_tags:
    - nav
    - footer
    - header
    - aside
    - script
    - style
    - noscript
    - form
  crawl4ai_excluded_selector: >-
    header, footer, nav, aside, form,
    .sidebar, .side-bar, .rightbar, .right-bar, .leftbar, .left-bar,
    .recommend, .recommended, .related, .related-posts, .hot, .rank, .ranking,
    .advertisement, .advertisements, .ads, .ad, .banner, .cookie, .modal,
    .comment, .comments, .reply, .share, .social, .breadcrumb, .pagination,
    .toolbar, .copyright, .download, .login, .register
  enable_scrapling: true                # third web fetch backend for competitive read
  scrapling_timeout_seconds: 25
  scrapling_max_chars: 8000
  scrapling_mode: dynamic               # "fetcher", "dynamic", or "stealthy"
  scrapling_content_source: html        # "html" or "text"
  scrapling_auto_match: true            # use Scrapling adaptive selector matching
  scrapling_network_idle: true          # dynamic/stealthy wait strategy
  scrapling_wait_ms: 0
  scrapling_wait_selector: ""
  scrapling_disable_resources: false
  scrapling_block_images: true
  scrapling_google_search: true         # Scrapling fetchers can mimic Google referral
  scrapling_real_chrome: false          # dynamic mode only; requires local Chrome
  scrapling_css_selector: ""            # optional hard restriction, e.g. "article"
  scrapling_target_elements: []         # optional focused selectors; empty = generic candidates
  scrapling_excluded_tags:
    - nav
    - footer
    - header
    - aside
    - script
    - style
    - noscript
    - form
  scrapling_excluded_selector: >-
    header, footer, nav, aside, form,
    .sidebar, .side-bar, .rightbar, .right-bar, .leftbar, .left-bar,
    .recommend, .recommended, .related, .related-posts, .hot, .rank, .ranking,
    .advertisement, .advertisements, .ads, .ad, .banner, .cookie, .modal,
    .comment, .comments, .reply, .share, .social, .breadcrumb, .pagination,
    .toolbar, .copyright, .download, .login, .register
  web_read_competitive_mode: true        # true = run Jina+crawl4ai+Scrapling dynamic in parallel and select best
  web_read_competitive_timeout_seconds: 35
  web_read_min_quality_score: 0.30
  web_read_min_clean_chars: 300
  web_read_compare_mode: false           # true = legacy compare logging mode
  enable_trafilatura_extraction: true
  max_consecutive_tool_errors: 3
  max_planner_failures: 2
  tool_concurrency_limit: 4
  enable_subagents: true
  fallback_to_legacy_on_runtime_error: true
  max_local_docs: 4
  max_local_chunks: 6
  max_local_retrieval_calls: 2
  max_web_queries: 3
  max_web_results: 8
  max_web_pages_to_read: 3
  search_provider: duckduckgo
  search_cache_ttl_seconds: 900
  enable_domain_skills: false
  enable_local_retrieval: true
  allow_test_corpus_retrieval: false
  enable_web_search: true
  enable_qwen_search: false
  max_qwen_search_calls: 2
  web_search_mode: auto
  enable_llm_web_decision: false
  min_evidence_before_search: 2
  enable_browser_fallback: true
  browser_fallback_wait_ms: 2500
  use_images: true
  send_images_to_llm: true
  enable_image_inspection_llm: true
  image_inspection_max_tokens: 2500
  max_llm_images: 4
  max_image_inspect_attempts: 2
  image_payload_format: openai_image_url
  image_max_side: 1280
  image_jpeg_quality: 75

web:
  provider_order:
    - searxng
    - html
    - tavily
    - brave
    - bing
    - serpapi
  searxng_url: "http://127.0.0.1:9980"
  max_results_per_query: 6
  max_pages_to_read: 3
  api_key_envs:
    tavily: TAVILY_API_KEY
    brave: BRAVE_SEARCH_API_KEY
    bing: BING_SEARCH_API_KEY
    serpapi: SERPAPI_API_KEY
  api_keys: {}

retrieval:
  embedding_model: 'Qwen/Qwen3-Embedding-4B'
  dense_weight: 0.65
  sparse_weight: 0.35
  device: cuda
  embedding_batch_size: 64
  enable_llm_query_rewriting: true
  enable_cross_encoder_rerank: false
  cross_encoder_model: 'BAAI/bge-reranker-v2-m3'

evaluation:
  semantic_backend: auto
  device: cuda
  bertscore_model: models/bert-base-chinese
  bertscore_num_layers: 12
  sentence_transformer_model: models/sentence-transformers__paraphrase-multilingual-MiniLM-L12-v2
  final_weights:
    llm_judge: 0.45
    structured_point_coverage: 0.25
    semantic_similarity: 0.20
    claim_rouge_l: 0.05
    technical_entity_match: 0.05
  enable_llm_judge: true
  enable_llm_scoring_points: false

runtime:
  seed: 42
  request_timeout_seconds: 180
  max_workers: 1
  resume: true
