# Exp22: exp20 baseline + search_strategy=max (更全面的多源搜索，不强制搜索)
paths:
  local_kb_index: knowledge_base/circuit_diagnosis_fts_hq_v3

agent:
  enable_local_retrieval: false
  max_local_retrieval_calls: 0
  max_local_docs: 4
  max_local_chunks: 6
  enable_web_search: false
  enable_qwen_search: true
  max_qwen_search_calls: 2
  max_total_seconds: 5400
  final_answer_timeout_seconds: 120
  tool_timeout_seconds: 1800
  qwen_search_options:
    search_strategy: max

retrieval:
  embedding_model: 'Qwen/Qwen3-Embedding-4B'
  dense_weight: 0.65
  sparse_weight: 0.35
  device: cuda
  embedding_batch_size: 64
